# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  PY: .venv/bin/python3

tasks:
  default:
    cmds:
      - task: status

  model:
    desc: "Set model size (0.5B, 1.5B, 3B) or a fine-tuned checkpoint from models/"
    summary: |
      Size:        task model -- 0.5
                   task model -- 1.5
                   task model -- 3
                   task model -- 7
      Checkpoint:  task model -- Qwen2.5-Coder-0.5B_seed0
    cmds:
      - "{{.PY}} scripts/nb_params.py model {{.CLI_ARGS}}"

  dataset-hash:
    desc: "Pin the dataset revision SHA across all notebooks"
    summary: |
      Example:  task dataset-hash -- 4d26c13bf8473067db611fce495ce4dd27639c0a
    cmds:
      - "{{.PY}} scripts/nb_params.py dataset-hash {{.CLI_ARGS}}"

  dataset:
    desc: "Set the seed number (0, 1, 2) in training and evaluation notebooks"
    summary: |
      Example:  task dataset -- 1
    cmds:
      - "{{.PY}} scripts/nb_params.py dataset {{.CLI_ARGS}}"

  split:
    desc: "Set the dataset split name used by dataset-generation notebooks"
    summary: |
      Example:  task split -- train_real_compilable
    cmds:
      - "{{.PY}} scripts/nb_params.py split {{.CLI_ARGS}}"

  limit:
    desc: "Set the row limit for dataset-generation (default 3000)"
    summary: |
      Example:  task limit -- 3000
    cmds:
      - "{{.PY}} scripts/nb_params.py limit {{.CLI_ARGS}}"

  download-c-dataset:
    desc: "Download a C dataset split from HuggingFace into data/input/<split>/"
    vars:
      SPLIT:
        sh: 'printf "input split (ex. train_real_compilable): " >&2 && read v < /dev/tty && echo "${v:-train_real_compilable}"'
      REVISION:
        sh: 'printf "input hash (ex. 093085f8558cfd53de8e2c8f4ccc7b9e73dc22ae): " >&2 && read v < /dev/tty && echo "${v:-093085f8558cfd53de8e2c8f4ccc7b9e73dc22ae}"'
    env:
      SPLIT: '{{.SPLIT}}'
      REVISION: '{{.REVISION}}'
    cmds:
      - bash setup.sh

  status:
    desc: "Show current model, eval model, dataset hash, and seed"
    cmds:
      - "{{.PY}} scripts/nb_params.py status"
    silent: true
